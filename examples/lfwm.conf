set border_width 2
set border_active #528AE0
set border_inactive #3B3B48
set gap_in 4
set gap_out 8
set smart_borders true
set smart_gaps true
set modifier SUPER
set drag_modifier SUPER
set default_layout MASTER_STACK
set master_ratio 0.55
set master_count 1

ws 1 layout monocle
ws 2 layout grid
ws 3 layout master_stack
ws 4 layout horiz

bind SUPER Return exec foot
bind SUPER d exec bemenu-run
bind SUPER f exec firefox
bind SUPER j focus_next
bind SUPER k focus_prev
bind SUPER h ratio_dec 5
bind SUPER l ratio_inc 5
bind SUPER q close
bind SUPER s toggle_float
bind SUPER space layout_next
bind SUPER r reload
bind SUPER Escape quit

bind SUPER 1 workspace 1
bind SUPER 2 workspace 2
bind SUPER 3 workspace 3
bind SUPER 4 workspace 4
bind SUPER 5 workspace 5
bind SUPER 6 workspace 6
bind SUPER 7 workspace 7
bind SUPER 8 workspace 8
bind SUPER 9 workspace 9
bind SUPER 0 workspace 10
bind SUPER+SHIFT 1 movetows 1
bind SUPER+SHIFT 2 movetows 2
bind SUPER+SHIFT 3 movetows 3
bind SUPER+SHIFT 4 movetows 4
bind SUPER+SHIFT 5 movetows 5
bind SUPER+SHIFT 6 movetows 6
bind SUPER+SHIFT 7 movetows 7
bind SUPER+SHIFT 8 movetows 8
bind SUPER+SHIFT 9 movetows 9
bind SUPER+SHIFT 0 movetows 10

rule pavucontrol float
rule blueman-manager float
rule org.gnome.Nautilus float
rule firefox workspace 2

exec waybar
exec dunst
