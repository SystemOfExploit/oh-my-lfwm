set border_width 2
set border_active #d79921
set border_inactive #504945
set root_bg #282828
set bar_enabled true
set bar_position top
set bar_bg #282828
set bar_active #d79921
set bar_inactive #3c3836
set bar_active_fg #282828
set bar_inactive_fg #ebdbb2
set bar_status_fg #b8bb26
set bar_border #504945
set bar_border_width 0
set bar_padding_x 8
set bar_padding_y 5
set bar_workspace_gap 5
set bar_workspace_pad_x 10
set bar_show_counts true
set bar_show_layout true
set bar_show_status true
set bar_status lfwm
set gap_in 8
set gap_out 12
set bar_height 28
set smart_borders false
set smart_gaps true
set modifier SUPER
set drag_modifier SUPER
set edge_resize true
set edge_resize_margin 16
set default_layout dwindle
set focus_follows_mouse true
set active_opacity 0.96
set inactive_opacity 0.88
set drag_opacity 0.72
set animations true
set animation_steps 8
set animation_delay_ms 2
set animation_max_windows 6
set master_ratio 0.50
set master_count 1

ws 1 layout dwindle
ws 2 layout grid
ws 3 layout dwindle
ws 4 layout horiz

bind SUPER Return exec kitty
bind SUPER t exec kitty
bind SUPER b exec firefox
bind SUPER q close
bind SUPER v exec pavucontrol
bind SUPER e exec thunar
bind SUPER Right workspace_next
bind SUPER Left workspace_prev
bind SUPER Space layout_next
bind SUPER r reload
bind SUPER x toggle_float
bind SUPER m power_menu
bind SUPER+SHIFT m toggle_maximize
bind SUPER Escape quit

bind SUPER 1 workspace 1
bind SUPER 2 workspace 2
bind SUPER 3 workspace 3
bind SUPER 4 workspace 4
bind SUPER 5 workspace 5
bind SUPER 6 workspace 6
bind SUPER 7 workspace 7
bind SUPER 8 workspace 8
bind SUPER 9 workspace 9
bind SUPER 0 workspace 10
bind SUPER+SHIFT 1 movetows 1
bind SUPER+SHIFT 2 movetows 2
bind SUPER+SHIFT 3 movetows 3
bind SUPER+SHIFT 4 movetows 4
bind SUPER+SHIFT 5 movetows 5
bind SUPER+SHIFT 6 movetows 6
bind SUPER+SHIFT 7 movetows 7
bind SUPER+SHIFT 8 movetows 8
bind SUPER+SHIFT 9 movetows 9
bind SUPER+SHIFT 0 movetows 10

rule pavucontrol float
rule thunar float
rule firefox workspace 2
rule Yelp float
rule zenity float
rule kdialog float
rule xmessage float

exec feh --bg-fill /usr/share/lfwm/wallpapers/gruvbox_wallpaper.png || xsetroot -solid '#282828'
exec picom --config /dev/null --backend xrender
exec dunst
